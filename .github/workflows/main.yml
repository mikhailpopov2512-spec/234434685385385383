name: Android CI (Kotlin Build & Test)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch: # Позволяет запускать сборку вручную из вкладки Actions

jobs:
  build:
    name: Build and Check Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Prep Environment File
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "GEMINI_API_KEY=MY_GEMINI_API_KEY" > .env
          fi

      - name: Restore Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 --decode debug.keystore.base64 > debug.keystore
            echo "Successfully restored debug.keystore from base64"
          else
            echo "Warning: debug.keystore.base64 not found in workspace."
          fi

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Cache Build Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sberbank-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
